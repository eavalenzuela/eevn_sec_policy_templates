# Example substitution config for tools/render.py
# One substitution per line: KEY = value
# KEY is the placeholder text WITHOUT its square brackets, matched literally.
# Copy this file, tailor it to your organization, and run:
#   python3 tools/render.py --out ../myorg-policies --config myorg.conf --strip-comments
# Placeholders you don't map stay bracketed in the output and are reported
# as your remaining tailoring worklist.

COMPANY = [COMPANY]

# Common role placeholders — map to your real org chart
Security Officer / CISO = [Security Officer / CISO]
Security Officer = [Security Officer]
Privacy Officer = [Privacy Officer]
CTO = [CTO]
CEO = [CEO]
CEO / Board = [CEO / Board]
CTO / CEO = [CTO / CEO]
Platform Engineering Lead = [Platform Engineering Lead]
Engineering Lead = [Engineering Lead]
Head of People / HR = [Head of People / HR]

# Common stack placeholders — the set assumes AWS + Snowflake + GitHub
AWS = AWS
Snowflake = Snowflake
GitHub = GitHub
Slack = Slack
